<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Speed arc -->
  <circle cx="256" cy="270" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="18" stroke-dasharray="440 440" stroke-dashoffset="220" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="140" fill="none" stroke="url(#accent)" stroke-width="18" stroke-dasharray="330 440" stroke-dashoffset="220" stroke-linecap="round"/>
  <!-- Speed text -->
  <text x="256" y="260" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="800" font-size="90">DP</text>
  <text x="256" y="310" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-weight="500" font-size="28">km/h</text>
  <!-- Brand underline glow -->
  <rect x="156" y="380" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
</svg>
